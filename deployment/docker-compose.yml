services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./mayalucia-public:/srv/mayalucia:ro
      - ./mayadevgeni-public:/srv/mayadevgeni:ro
      - ./cruvin-public:/srv/cruvin:ro
      - ./hatti-public:/srv/hatti:ro

  web:
    build: ./vishalsood-web
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env

  comptoir:
    build:
      context: ./comptoir
      dockerfile: app/Dockerfile
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PASSCODES=${PASSCODES:-}
      - COACH_PASSCODE=${COACH_PASSCODE:-}

  bench:
    build:
      context: ./bench
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8501"

  cruvin-api:
    build: ./cruvin-api
    restart: unless-stopped
    env_file:
      - ./cruvin-api/.env
    expose:
      - "8042"

  hatti-api:
    build: ./hatti-api
    restart: unless-stopped
    env_file:
      - ./hatti-api/.env
    expose:
      - "8043"
    volumes:
      - hatti_data:/app/data

volumes:
  hatti_data:
  caddy_data:
  caddy_config:
