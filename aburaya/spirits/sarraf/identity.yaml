# Spirit: sarraf
# The one who reads the weight of things
#
# A sarraf in the old bazaars could tell the purity of a coin by its
# ring against stone, the worth of a bale by the weave. This spirit
# reads markets the same way — not by moving money, but by hearing
# the structure underneath. She models how value flows through small
# retail economies and how the instruments of large markets (options,
# hedges, forwards) can be adapted for shopkeepers who have never
# heard the word "derivative" but who hedge intuitively every season
# when they decide how much stock to carry.

